<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FolderTab - Adicionar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="src/style.css" />
  <link rel="stylesheet" href="src/popup.css" />
</head>

<body>
  <div id="popup">
    <header id="popup-header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 7C3 5.9 3.9 5 5 5H10L12 7H19C20.1 7 21 7.9 21 9V17C21 18.1 20.1 19 19 19H5C3.9 19 3 18.1 3 17V7Z"
            stroke="currentColor" stroke-width="1.5" fill="rgba(240,167,66,0.15)" />
        </svg>
        <span>FolderTab</span>
      </div>
    </header>

    <!-- Tela inicial com as duas opções -->
    <div id="main-menu">
      <button id="btn-save-site" class="action-btn primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
          <path d="M12 8V16M8 12H16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        <div>
          <strong>Salvar Site</strong>
          <span class="subtitle">Adicionar aba atual</span>
        </div>
      </button>

      <button id="btn-save-window" class="action-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8" />
          <path d="M3 10H21" stroke="currentColor" stroke-width="1.8" />
          <path d="M7 21H17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M12 17V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        <div>
          <strong>Salvar Janela</strong>
          <span class="subtitle">Criar pasta com múltiplas abas</span>
        </div>
      </button>
    </div>

    <!-- Tela de salvar site -->
    <div id="save-site-view" style="display:none">
      <div id="current-site">
        <img id="site-favicon" src="" alt=""
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="fallback-icon" id="site-fallback" style="display:none"></div>
        <div id="site-info">
          <div id="site-title"></div>
          <div id="site-url"></div>
        </div>
      </div>

      <button id="btn-add-to-root" class="action-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M3 7C3 5.9 3.9 5 5 5H10L12 7H19C20.1 7 21 7.9 21 9V17C21 18.1 20.1 19 19 19H5C3.9 19 3 18.1 3 17V7Z"
            stroke="currentColor" stroke-width="1.5" fill="rgba(240,167,66,0.15)" />
        </svg>
        Acesso Rápido
      </button>

      <div class="divider"><span>ou escolha uma pasta</span></div>

      <div id="folders-list"></div>

      <button id="btn-back-main" class="btn-ghost back-btn">← Voltar</button>
    </div>

    <!-- Tela de salvar janela -->
    <div id="save-window-view" style="display:none">
      <div class="field-group">
        <label>Nome da nova pasta</label>
        <input id="new-folder-name" class="field-input" placeholder="ex: Pesquisa, Trabalho..." maxlength="60" />
      </div>

      <div class="tabs-header">
        <span class="tabs-count">0 abas encontradas</span>
        <label class="select-all">
          <input type="checkbox" id="select-all-tabs" />
          Selecionar todas
        </label>
      </div>

      <div id="tabs-list"></div>

      <div class="window-actions">
        <button id="btn-back-main-window" class="btn-ghost">← Voltar</button>
        <button id="btn-create-folder" class="btn-primary">Criar pasta</button>
      </div>
    </div>

    <!-- Confirmação -->
    <div id="confirmation" style="display:none">
      <div class="confirm-box">
        <p class="confirm-text">
          Adicionar <strong id="confirm-site-title"></strong> em?
        </p>
        <div class="confirm-folder" id="confirm-folder-name"></div>
        <div class="confirm-actions">
          <button id="btn-confirm-cancel" class="btn-ghost">Cancelar</button>
          <button id="btn-confirm-add" class="btn-primary">Adicionar</button>
        </div>
      </div>
    </div>

    <!-- Sucesso -->
    <div id="success" style="display:none">
      <div class="success-box">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" class="success-icon">
          <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
        </svg>
        <p>Salvo com sucesso!</p>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading">
      <svg class="spinner" width="24" height="24" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="60"
          stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s"
            repeatCount="indefinite" />
        </circle>
      </svg>
      <span>Carregando...</span>
    </div>
  </div>

  <script src="src/popup.js"></script>
</body>

</html>
